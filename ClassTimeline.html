<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Class Timeline — Two Step Collective</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bitter:ital,wght@0,500;0,700;1,700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  /* Same palette + fonts as the main site's css/styles.css, kept local
     here since this page lives outside that stylesheet's reach */
  :root {
    --bg: #f8f3e8;
    --ink: #191919;
    --ink-soft: rgba(25, 25, 25, 0.62);
    --coral: #e16e57;
    --chartreuse: #e2e88c;
    --seafoam: #a3c7c5;
    --blue: #2e72a4;
    --pink: #d66577;
    --serif: 'Bitter', Georgia, serif;
    --sans: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    padding: 2rem;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--ink);
    color: var(--bg);
    font-weight: 700;
    font-size: 0.7rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    text-decoration: none;
    padding: 0.55rem 1.1rem;
    border-radius: 999px;
    border: 2px solid var(--ink);
  }
  .back-link span { color: var(--chartreuse); }
  h1 {
    font-family: var(--serif);
    font-weight: 700;
    font-style: italic;
    font-size: 1.75rem;
    margin: 1.5rem 0 1rem;
  }
  #d3-container-2 {
    background: #fffdfa;
    border: 2px solid var(--ink);
    border-radius: 16px;
    padding: 1.5rem;
    display: inline-block;
  }
</style>
</head>
<body>

  <a class="back-link" href="index.html"><span aria-hidden="true">★</span> Back to Two Step Collective</a>

  <h1>Class Timeline</h1>

  <!--
    The "hook": an empty element that starts with nothing in it.
    Your .js file finds this by id (d3.select("#d3-container-2")) and
    fills it in at runtime. The id here MUST match the id the script
    looks for, or it silently finds nothing and draws nothing.
  -->
  <div id="d3-container-2"></div>

  <!--
    Script tags run top to bottom, in order. Order matters here:

    1) Load the library first. This defines the global `d3` object
       that your own script depends on.
    2) Load your own script second. If this were listed FIRST, it would
       run before `d3` exists and crash with "d3 is not defined."

    Also note: this is a <script src="..."> — pointing AT a .js file —
    not the JS code itself typed inline. That's what actually "puts
    the .js in": the browser fetches test.js and executes it here.
  -->
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="Data%20visualization/test.js"></script>
</body>
</html>
